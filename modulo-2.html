<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#08080a">
  <link rel="manifest" href="manifest.json">
  <title>Ramas · Sistema Flujo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/sistema.css">
  <style>
    .choose { transition: opacity 0.35s, transform 0.35s; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .choose.off { opacity: 0; pointer-events: none; transform: scale(0.97); }
    .reveal {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1.25rem calc(var(--nav-h) + 4.5rem + env(safe-area-inset-bottom));
      opacity: 0; pointer-events: none; transition: opacity 0.45s; z-index: 15;
    }
    .reveal.on { opacity: 1; pointer-events: auto; }
    .reveal-tag { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rama-a); margin-bottom: 1.25rem; }
    .reveal-tag.b { color: var(--rama-b); }
    .truth { font-family: 'Instrument Serif', serif; font-size: clamp(1.15rem, 4.5vw, 1.45rem); text-align: center; max-width: 320px; line-height: 1.4; margin-bottom: 0.85rem; }
    .insight { font-size: 0.66rem; color: var(--muted); text-align: center; max-width: 310px; line-height: 1.65; }
    .actions { position: absolute; bottom: calc(var(--nav-h) + 0.75rem + env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; gap: 0.55rem; }
    .card.rama-a:hover { border-color: var(--rama-a); }
    .card.rama-b:hover { border-color: var(--rama-b); }
  </style>
</head>
<body class="no-scroll">
  <div class="grain" aria-hidden="true"></div>
  <div class="app full">
    <main class="page center choose" id="choose">
      <p class="module-tag">Mirando desde fuera</p>
      <h1 class="page-title" style="text-align:center">Después del<br><span class="old italic serif">"Otra vez…"</span></h1>
      <p class="page-sub" style="text-align:center;margin-bottom:1.5rem">Con gente delante. En la grada. ¿Qué hace tu sistema?</p>
      <div class="stack">
        <button class="card rama-a" type="button" data-branch="a">
          <div class="card-id">Rama A · La más frecuente</div>
          <div class="card-label">Ya la di por perdida</div>
          <div class="card-hint">Él conecta, ríe. Tú fuera. Ni lo intentas — el tribunal ya cerró.</div>
        </button>
        <button class="card rama-b" type="button" data-branch="b">
          <div class="card-id">Rama B · Contrataque</div>
          <div class="card-label">Vi mi oportunidad</div>
          <div class="card-hint">Él falló. Entro ahora — no para conectar, para que el marcador se incline.</div>
        </button>
      </div>
    </main>

    <section class="reveal" id="reveal" hidden>
      <p class="reveal-tag" id="tag"></p>
      <p class="truth" id="truth"></p>
      <p class="insight" id="insight"></p>
      <div class="actions">
        <a class="link-btn" id="cutLink" href="cortar.html?modo=comparacion">Cortar marcador</a>
        <button class="text-btn" type="button" id="back">Volver</button>
      </div>
    </section>
  </div>

  <script src="assets/mapa.js"></script>
  <script>
    const choose = document.getElementById('choose');
    const reveal = document.getElementById('reveal');
    const tag = document.getElementById('tag');

    function show(branch) {
      const d = MAPA.ramas[branch];
      tag.textContent = d.tag;
      tag.className = 'reveal-tag' + (branch === 'b' ? ' b' : '');
      document.getElementById('truth').innerHTML = d.truth;
      document.getElementById('insight').textContent = d.insight;
      document.getElementById('cutLink').href = d.link;
      choose.classList.add('off');
      reveal.hidden = false;
      requestAnimationFrame(() => reveal.classList.add('on'));
    }

    function back() {
      reveal.classList.remove('on');
      setTimeout(() => { reveal.hidden = true; choose.classList.remove('off'); }, 350);
    }

    document.querySelectorAll('[data-branch]').forEach(b => b.addEventListener('click', () => show(b.dataset.branch)));
    document.getElementById('back').addEventListener('click', back);
    SISTEMA.injectNav('modulo-2.html');
  </script>
</body>
</html>
