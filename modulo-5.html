<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#08080a">
  <link rel="manifest" href="manifest.json">
  <title>Flash · Sistema Flujo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/sistema.css">
</head>
<body class="no-scroll">
  <div class="grain" aria-hidden="true"></div>
  <div class="app full">
    <section class="screen screen-ready active" id="screenReady">
      <div class="page center justify" style="height:100%;padding-bottom:calc(var(--nav-h) + 1rem + var(--safe-bottom))">
        <p class="module-tag" style="align-self:center;text-align:center">La palanca · 10 segundos</p>
        <p class="module-tag old" style="font-size:0.62rem;letter-spacing:0.1em;margin-bottom:0.35rem">ENTRE miedo y filtro global</p>
        <h1 class="trigger-big">Miedo a perderlo</h1>
        <p class="page-sub" style="text-align:center;margin-bottom:1.75rem">
          Te empujas: acelerar. Producir.<br>
          <strong style="color:var(--text);font-weight:500">"Di algo bueno."</strong>
        </p>
        <button class="btn-round" id="btnGo" type="button">
          <span class="btn-round-ring" aria-hidden="true"></span>
          <span class="btn-round-label">No acelerar</span>
        </button>
      </div>
    </section>

    <section class="screen screen-cut" id="screenCut">
      <div class="cut-panel">
        <p class="strike" id="textOld"></p>
        <p class="cut-text" id="textCut"></p>
        <p class="cut-anchor" id="textAnchor"></p>
        <button class="cut-dismiss" id="btnDismiss" type="button">Toca para volver</button>
      </div>
    </section>
  </div>

  <script src="assets/mapa.js"></script>
  <script>
    (function () {
      const c = MAPA.cortes.flash;
      const ready = document.getElementById('screenReady');
      const cut = document.getElementById('screenCut');
      const textOld = document.getElementById('textOld');
      const textCut = document.getElementById('textCut');
      const textAnchor = document.getElementById('textAnchor');
      const btnDismiss = document.getElementById('btnDismiss');
      let on = false;
      let timers = [];

      textOld.textContent = c.old;
      textCut.innerHTML = c.cut;
      textAnchor.textContent = c.anchor;

      function later(fn, ms) { timers.push(setTimeout(fn, ms)); }
      function clearAll() { timers.forEach(clearTimeout); timers = []; }

      function activate() {
        if (on) return;
        on = true;
        clearAll();
        [textOld, textCut, textAnchor, btnDismiss].forEach(el => el.classList.remove('show'));
        ready.classList.remove('active');
        cut.classList.add('active');
        later(() => textOld.classList.add('show'), 80);
        later(() => textCut.classList.add('show'), 260);
        later(() => { textAnchor.classList.add('show'); btnDismiss.classList.add('show'); }, 420);
      }

      function reset() {
        if (!on) return;
        on = false;
        clearAll();
        [textOld, textCut, textAnchor, btnDismiss].forEach(el => el.classList.remove('show'));
        cut.classList.remove('active');
        ready.classList.add('active');
      }

      let lastTouch = 0;
      function bindTap(el, fn) {
        el.addEventListener('touchend', e => { lastTouch = Date.now(); e.preventDefault(); fn(); }, { passive: false });
        el.addEventListener('click', () => { if (Date.now() - lastTouch < 500) return; fn(); });
      }

      bindTap(document.getElementById('btnGo'), activate);
      bindTap(btnDismiss, reset);
      SISTEMA.injectNav('modulo-5.html');
    })();
  </script>
</body>
</html>
