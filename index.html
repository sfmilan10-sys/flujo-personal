<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#08080a">
  <link rel="manifest" href="manifest.json">
  <title>Sistema Flujo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/sistema.css">
  <style>
    .hero-quote {
      font-family: 'Instrument Serif', serif;
      font-size: 1.05rem;
      line-height: 1.45;
      margin: 1rem 0 0.25rem;
      color: var(--text);
    }
    .section-label {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 1.5rem 0 0.65rem;
    }
  </style>
</head>
<body class="scroll">
  <div class="grain" aria-hidden="true"></div>
  <div class="app">
    <main class="page">
      <p class="module-tag">Tu sistema · Personal</p>
      <h1 class="page-title">Sistema Flujo</h1>
      <p class="page-sub wide">No es motivación. Es cortar las órdenes que tu mente ejecuta sola.</p>

      <div class="nuclear" id="nuclearOld"></div>
      <div class="nuclear nuclear-new" id="nuclearNew"></div>

      <p class="section-label">Tu ciclo (mapeado)</p>
      <div class="cycle-box" id="cycleBox"></div>

      <p class="section-label">¿Qué notas ahora?</p>
      <div class="stack" id="router"></div>

      <p class="hero-quote" style="margin-top:1.75rem;font-size:0.85rem;color:var(--muted)">
        Evidencia que el juez borra: <span class="accent italic">imperfecto → te reíste → auténtico → conectó.</span>
      </p>
    </main>
  </div>

  <script src="assets/mapa.js"></script>
  <script>
    document.getElementById('nuclearOld').innerHTML = '<strong>Creencia vieja:</strong> ' + MAPA.nuclear.vieja;
    document.getElementById('nuclearNew').innerHTML = '<strong>Orden vital:</strong> ' + MAPA.nuclear.nueva;

    document.getElementById('cycleBox').innerHTML = MAPA.ciclo.map(s =>
      `<div class="cycle-step${s.hi ? ' highlight' : ''}">${s.t}</div>`
    ).join('');

    document.getElementById('router').innerHTML = MAPA.router.map(r => `
      <a class="card" href="${r.href}">
        <div class="card-id">${r.id}</div>
        <div class="card-label">${r.label}</div>
        <div class="card-hint">${r.hint}</div>
      </a>
    `).join('');

    SISTEMA.injectNav('index.html');
  </script>
</body>
</html>
