<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#08080a">
  <link rel="manifest" href="manifest.json">
  <title>Log · Sistema Flujo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/sistema.css">
  <style>
    .stats { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
    .stat { flex: 1; min-width: 70px; border: 1px solid var(--dim); border-radius: 4px; padding: 0.6rem; text-align: center; }
    .stat-num { font-family: 'Instrument Serif', serif; font-size: 1.25rem; }
    .stat-label { font-size: 0.48rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-top: 0.15rem; }
    .stat.bad .stat-num { color: var(--old); }
    .stat.good .stat-num { color: var(--good); }
    .list { flex: 1; overflow-y: auto; padding-bottom: 0.5rem; -webkit-overflow-scrolling: touch; }
    .empty { text-align: center; padding: 2rem 0.5rem; font-size: 0.68rem; color: var(--muted); line-height: 1.7; }
    .empty em { display: block; font-family: 'Instrument Serif', serif; font-style: italic; color: var(--accent); margin-bottom: 0.5rem; font-size: 0.95rem; }
    .entry { border: 1px solid var(--dim); border-radius: 4px; padding: 0.85rem; margin-bottom: 0.6rem; background: var(--surface); cursor: pointer; }
    .entry-top { display: flex; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.4rem; }
    .entry-type { font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.15rem 0.4rem; border-radius: 2px; border: 1px solid; }
    .entry-type.rigid, .entry-type.tarde { color: var(--old); border-color: var(--old); }
    .entry-type.solté, .entry-type.flash { color: var(--good); border-color: var(--good); }
    .entry-date { font-size: 0.48rem; color: var(--dim); }
    .entry-text { font-size: 0.68rem; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .entry-meta { font-size: 0.55rem; color: var(--dim); margin-top: 0.35rem; }
    .fab {
      position: fixed; right: 1.25rem; bottom: calc(var(--nav-h) + 0.65rem + env(safe-area-inset-bottom));
      width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--accent); background: var(--surface);
      color: var(--accent); font-size: 1.4rem; cursor: pointer; z-index: 25; box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }
    .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .sheet-bg.open { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; max-height: 90vh; background: var(--surface);
      border-top: 1px solid var(--dim); border-radius: 12px 12px 0 0; z-index: 60; transform: translateY(100%);
      transition: transform 0.35s; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-body { overflow-y: auto; padding: 0.5rem 1.25rem 1rem; flex: 1; }
    .sheet-title { font-family: 'Instrument Serif', serif; font-size: 1.15rem; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field-label { font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; display: block; }
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
    .type-opt, .branch-opt {
      padding: 0.55rem 0.35rem; border: 1px solid var(--dim); border-radius: 4px; background: var(--bg);
      color: var(--text); font-family: inherit; font-size: 0.55rem; cursor: pointer; text-align: center; line-height: 1.35;
    }
    .type-opt.selected.rigid, .type-opt.selected.tarde { border-color: var(--old); background: rgba(139,90,90,0.08); }
    .type-opt.selected.solté, .type-opt.selected.flash { border-color: var(--good); background: rgba(106,138,106,0.08); }
    .branch-row { display: flex; gap: 0.35rem; }
    .branch-opt { flex: 1; color: var(--muted); }
    .branch-opt.selected { border-color: var(--accent); color: var(--accent); }
    textarea {
      width: 100%; min-height: 76px; padding: 0.65rem; border: 1px solid var(--dim); border-radius: 4px;
      background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.68rem; line-height: 1.5; resize: vertical;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .sheet-actions { display: flex; gap: 0.4rem; padding: 0.85rem 1.25rem; border-top: 1px solid var(--dim); }
    .btn { flex: 1; padding: 0.75rem; border-radius: 4px; font-family: inherit; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; }
    .btn-save { border: 1px solid var(--accent); background: var(--accent); color: var(--bg); }
    .btn-cancel { border: 1px solid var(--dim); background: transparent; color: var(--muted); }
    .btn-delete { border: 1px solid var(--old); color: var(--old); background: transparent; flex: 0 0 auto; padding: 0.75rem 0.85rem; }
    .toast {
      position: fixed; top: max(0.75rem, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-120%);
      background: var(--surface-2); border: 1px solid var(--dim); color: var(--accent); font-size: 0.58rem;
      letter-spacing: 0.14em; text-transform: uppercase; padding: 0.5rem 1rem; border-radius: 4px; z-index: 200; transition: transform 0.35s;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .page { display: flex; flex-direction: column; min-height: 100%; }
  </style>
</head>
<body class="scroll">
  <div class="grain" aria-hidden="true"></div>
  <div class="app">
    <main class="page">
      <p class="module-tag">Evidencia · En frío</p>
      <h1 class="page-title">Tu log</h1>
      <p class="page-sub wide">Datos contra el juez. Registrar <em>después</em> — no en pleno bucle.</p>

      <div class="stats" id="stats"></div>
      <div class="list" id="list">
        <div class="empty" id="empty">
          <em>Sin entradas aún</em>
          Cuando notes tarde o cortes el flash, anótalo aquí. Munición contra "si no controlo, quedo mal".
        </div>
        <div id="entries"></div>
      </div>
    </main>
  </div>

  <button class="fab" id="fab" type="button" aria-label="Nueva entrada">+</button>

  <div class="sheet-bg" id="overlay"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-body">
      <h2 class="sheet-title" id="sheetTitle">Nueva entrada</h2>
      <div class="field">
        <span class="field-label">Qué pasó</span>
        <div class="type-grid" id="typeGrid"></div>
      </div>
      <div class="field">
        <span class="field-label">Rama / freno (opcional)</span>
        <div class="branch-row" id="branchRow">
          <button type="button" class="branch-opt" data-branch="">—</button>
          <button type="button" class="branch-opt" data-branch="flash">Flash</button>
          <button type="button" class="branch-opt" data-branch="a">Rama A</button>
          <button type="button" class="branch-opt" data-branch="b">Rama B</button>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="situation">Situación — con tus palabras</label>
        <textarea id="situation" placeholder="Ej: noté el miedo, aceleré, dije algo calculado…" required></textarea>
      </div>
      <div class="field">
        <label class="field-label" for="aftermath">Después (opcional)</label>
        <textarea id="aftermath" placeholder="Ej: corté tarde / solté y algo imperfecto funcionó…"></textarea>
      </div>
    </div>
    <div class="sheet-actions">
      <button type="button" class="btn btn-delete" id="btnDelete" hidden>Eliminar</button>
      <button type="button" class="btn btn-cancel" id="btnCancel">Cancelar</button>
      <button type="button" class="btn btn-save" id="btnSave">Guardar</button>
    </div>
  </div>
  <div class="toast" id="toast">Guardado</div>

  <script src="assets/mapa.js"></script>
  <script>
    const STORAGE_KEY = 'sistema-flujo-evidencia-v1';
    const TYPE_LABELS = Object.fromEntries(MAPA.evidencia.tipos.map(t => [t.id, t.label]));

    let entries = [], editingId = null, selectedType = 'rigid', selectedBranch = '';

    const typeGrid = document.getElementById('typeGrid');
    typeGrid.innerHTML = MAPA.evidencia.tipos.map(t =>
      `<button type="button" class="type-opt ${t.id}" data-type="${t.id}">${t.label}</button>`
    ).join('');

    function load() {
      try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { entries = []; }
      render();
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      document.getElementById('toast').classList.add('show');
      setTimeout(() => document.getElementById('toast').classList.remove('show'), 1600);
    }

    function fmt(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) + ' · ' +
        d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }

    function branchLabel(b) {
      return { a: 'Rama A', b: 'Rama B', flash: 'Flash' }[b] || '';
    }

    function render() {
      const counts = { rigid: 0, solté: 0, flash: 0, tarde: 0 };
      entries.forEach(e => { if (counts[e.type] !== undefined) counts[e.type]++; });

      document.getElementById('stats').innerHTML = `
        <div class="stat bad"><div class="stat-num">${counts.rigid}</div><div class="stat-label">Juez ON</div></div>
        <div class="stat good"><div class="stat-num">${counts.solté}</div><div class="stat-label">Solté</div></div>
        <div class="stat good"><div class="stat-num">${counts.flash}</div><div class="stat-label">Corté flash</div></div>
        <div class="stat bad"><div class="stat-num">${counts.tarde}</div><div class="stat-label">Tarde</div></div>`;

      const empty = document.getElementById('empty');
      const wrap = document.getElementById('entries');
      if (!entries.length) { empty.style.display = 'block'; wrap.innerHTML = ''; return; }
      empty.style.display = 'none';

      wrap.innerHTML = [...entries].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)).map(e => `
        <article class="entry" data-id="${e.id}">
          <div class="entry-top">
            <span class="entry-type ${e.type}">${TYPE_LABELS[e.type] || e.type}</span>
            <span class="entry-date">${fmt(e.updatedAt)}</span>
          </div>
          <p class="entry-text">${esc(e.situation)}</p>
          ${e.branch ? `<p class="entry-meta">${branchLabel(e.branch)}</p>` : ''}
        </article>`).join('');

      wrap.querySelectorAll('.entry').forEach(el => el.addEventListener('click', () => openEdit(el.dataset.id)));
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function setType(t) {
      selectedType = t;
      typeGrid.querySelectorAll('.type-opt').forEach(o => o.classList.toggle('selected', o.dataset.type === t));
    }

    function setBranch(b) {
      selectedBranch = b;
      document.querySelectorAll('.branch-opt').forEach(o => o.classList.toggle('selected', o.dataset.branch === b));
    }

    function openSheet() {
      document.getElementById('overlay').classList.add('open');
      document.getElementById('sheet').classList.add('open');
      document.getElementById('situation').focus();
    }

    function closeSheet() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('sheet').classList.remove('open');
      editingId = null;
    }

    function openNew() {
      editingId = null;
      document.getElementById('sheetTitle').textContent = 'Nueva entrada';
      document.getElementById('situation').value = '';
      document.getElementById('aftermath').value = '';
      setType('rigid'); setBranch('');
      document.getElementById('btnDelete').hidden = true;
      openSheet();
    }

    function openEdit(id) {
      const e = entries.find(x => x.id === id);
      if (!e) return;
      editingId = id;
      document.getElementById('sheetTitle').textContent = 'Editar';
      document.getElementById('situation').value = e.situation;
      document.getElementById('aftermath').value = e.aftermath || '';
      setType(e.type); setBranch(e.branch || '');
      document.getElementById('btnDelete').hidden = false;
      openSheet();
    }

    function save() {
      const sit = document.getElementById('situation').value.trim();
      if (!sit) return document.getElementById('situation').focus();
      const now = new Date().toISOString();
      const data = {
        type: selectedType,
        branch: selectedBranch || null,
        situation: sit,
        aftermath: document.getElementById('aftermath').value.trim() || null,
        updatedAt: now
      };
      if (editingId) {
        const i = entries.findIndex(x => x.id === editingId);
        if (i >= 0) entries[i] = { ...entries[i], ...data };
      } else {
        entries.push({ id: crypto.randomUUID(), createdAt: now, ...data });
      }
      persist(); render(); closeSheet();
    }

    function remove() {
      if (!editingId || !confirm('¿Eliminar?')) return;
      entries = entries.filter(e => e.id !== editingId);
      persist(); render(); closeSheet();
    }

    typeGrid.querySelectorAll('.type-opt').forEach(o => o.addEventListener('click', () => setType(o.dataset.type)));
    document.querySelectorAll('.branch-opt').forEach(o => o.addEventListener('click', () => setBranch(o.dataset.branch)));
    document.getElementById('fab').addEventListener('click', openNew);
    document.getElementById('btnSave').addEventListener('click', save);
    document.getElementById('btnCancel').addEventListener('click', closeSheet);
    document.getElementById('btnDelete').addEventListener('click', remove);
    document.getElementById('overlay').addEventListener('click', closeSheet);

    load();
    SISTEMA.injectNav('modulo-3.html');
  </script>
</body>
</html>
