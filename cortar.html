<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08080a">
  <link rel="manifest" href="manifest.json">
  <title>Cortar · Sistema Flujo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/sistema.css">
</head>
<body class="no-scroll">
  <div class="grain" aria-hidden="true"></div>

  <div class="app full" id="app">
    <!-- PANTALLA 1: Elegir orden -->
    <section class="screen screen-pick active" id="screenPick" aria-label="Elegir orden">
      <div class="page center scroll-y">
        <p class="module-tag">Cortar · Revocar la orden</p>
        <h1 class="page-title">¿Qué orden cortar?</h1>
        <p class="page-sub">No es hacer algo bien. Es retirar el mandato que corre solo en tu cabeza.</p>
        <div class="stack" id="modeList" aria-label="Tipos de corte"></div>
      </div>
    </section>

    <!-- PANTALLA 2: Listo para cortar -->
    <section class="screen screen-ready" id="screenReady" aria-label="Preparar corte">
      <div class="page center justify" style="height:100%;padding-bottom:calc(var(--nav-h) + 1rem + var(--safe-bottom))">
        <p class="module-tag" id="readyTag" style="align-self:center;text-align:center">Corte</p>
        <p class="trigger-big" id="triggerText"></p>
        <p class="page-sub" style="text-align:center;margin-bottom:1.75rem" id="triggerSub"></p>
        <button class="btn-round" id="btnCut" type="button" aria-label="Ejecutar corte">
          <span class="btn-round-ring" aria-hidden="true"></span>
          <span class="btn-round-label" id="btnCutLabel">Cortar</span>
        </button>
        <button class="text-btn" type="button" id="btnBackPick">← Elegir otra orden</button>
      </div>
    </section>

    <!-- PANTALLA 3: Corte activo (sobre la nav) -->
    <section class="screen screen-cut" id="screenCut" aria-label="Corte activo">
      <div class="cut-panel" id="cutPanel">
        <div class="scoreboard is-hidden" id="scoreboard" aria-hidden="true">
          <div class="score-col them">
            <div class="score-bar"></div>
            <span class="score-label">Él</span>
          </div>
          <div class="score-col you">
            <div class="score-bar"></div>
            <span class="score-label">Tú</span>
          </div>
        </div>

        <div class="meter is-hidden" id="meter" aria-hidden="true">
          <span class="meter-fill" id="meterFill"></span>
        </div>

        <p class="strike" id="textOld"></p>
        <p class="cut-text" id="textCut"></p>
        <p class="cut-anchor" id="textAnchor"></p>
        <button class="cut-dismiss" id="btnDismiss" type="button">Toca para volver</button>
      </div>
    </section>
  </div>

  <script src="assets/mapa.js"></script>
  <script src="assets/cortar.js"></script>
</body>
</html>
