<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#08080a">
  <link rel="manifest" href="manifest.json">
  <title>Frenos · Sistema Flujo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/sistema.css">
  <style>
    .choose { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.35s; }
    .choose.off { opacity: 0; pointer-events: none; transform: scale(0.97); }
    .reveal {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1.25rem calc(var(--nav-h) + 5rem + env(safe-area-inset-bottom));
      opacity: 0; pointer-events: none; transition: opacity 0.45s; z-index: 15;
    }
    .reveal.on { opacity: 1; pointer-events: auto; }
    .reveal-tag { font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .truth { font-family: 'Instrument Serif', serif; font-size: clamp(1.1rem, 4.2vw, 1.4rem); text-align: center; max-width: 320px; line-height: 1.4; margin-bottom: 0.75rem; }
    .insight { font-size: 0.65rem; color: var(--muted); text-align: center; max-width: 310px; line-height: 1.65; }
    .actions { position: absolute; bottom: calc(var(--nav-h) + 0.75rem + env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; gap: 0.55rem; }
  </style>
</head>
<body class="no-scroll">
  <div class="grain" aria-hidden="true"></div>
  <div class="app full">
    <main class="page center choose" id="choose">
      <p class="module-tag">Identificar · No mandar</p>
      <h1 class="page-title" style="text-align:center">¿Qué freno<br>está activo?</h1>
      <p class="page-sub" style="text-align:center;margin-bottom:1.25rem">Tu señal suele ser el análisis — no el cuerpo. Elige lo que reconoces.</p>
      <div class="stack" id="frenoList"></div>
    </main>

    <section class="reveal" id="reveal" hidden>
      <p class="reveal-tag" id="tag"></p>
      <p class="truth" id="truth"></p>
      <p class="insight" id="insight"></p>
      <div class="actions">
        <a class="link-btn" id="cutLink" href="cortar.html">Cortar</a>
        <button class="text-btn" type="button" id="back">Volver</button>
      </div>
    </section>
  </div>

  <script src="assets/mapa.js"></script>
  <script>
    const labels = {
      espeso: { title: 'Espeso — juzgando la frase', hint: '"Di algo bueno" antes de hablar' },
      analisis: { title: 'Análisis sobre mí', hint: '¿Cómo recupero al ideal? El bucle' },
      evaluacion: { title: 'Todo es examen', hint: 'Filtro global — cae de golpe' },
      comparar: { title: '"Otra vez…" — la grada', hint: 'Ranking. Mirando desde fuera' }
    };

    const choose = document.getElementById('choose');
    const reveal = document.getElementById('reveal');
    const frenoList = document.getElementById('frenoList');

    frenoList.innerHTML = Object.entries(labels).map(([key, l]) => `
      <button class="card" type="button" data-freno="${key}">
        <div class="card-id">${MAPA.frenos[key].tag.replace('Tu freno · ', '')}</div>
        <div class="card-label">${l.title}</div>
        <div class="card-hint">${l.hint}</div>
      </button>
    `).join('');

    function show(key) {
      const f = MAPA.frenos[key];
      document.getElementById('tag').textContent = f.tag;
      document.getElementById('truth').innerHTML = f.truth;
      document.getElementById('insight').textContent = f.insight;
      document.getElementById('cutLink').href = f.link;
      choose.classList.add('off');
      reveal.hidden = false;
      requestAnimationFrame(() => reveal.classList.add('on'));
    }

    function back() {
      reveal.classList.remove('on');
      setTimeout(() => { reveal.hidden = true; choose.classList.remove('off'); }, 350);
    }

    frenoList.querySelectorAll('[data-freno]').forEach(b => b.addEventListener('click', () => show(b.dataset.freno)));
    document.getElementById('back').addEventListener('click', back);

    const pre = SISTEMA.qs('freno');
    if (pre && MAPA.frenos[pre]) show(pre);

    SISTEMA.injectNav('modulo-4.html');
  </script>
</body>
</html>
